<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>うちの子日記</title>
    <style>
      :root {
        --bg: #f4f8f2;
        --card: #ffffff;
        --line: #d7e2d1;
        --ink: #233222;
        --sub: #5f6f5f;
        --accent: #c76686;
        --accent-soft: #fff0f5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          "Hiragino Sans",
          "Yu Gothic",
          "Noto Sans JP",
          sans-serif;
        background: linear-gradient(180deg, #eef6ea 0%, var(--bg) 100%);
        color: var(--ink);
      }

      .wrap {
        width: min(760px, calc(100% - 32px));
        margin: 48px auto;
      }

      .hero,
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: 0 18px 40px rgba(35, 50, 34, 0.08);
      }

      .hero {
        padding: 28px;
        margin-bottom: 18px;
      }

      h1,
      h2 {
        margin: 0;
      }

      h1 {
        font-size: clamp(30px, 6vw, 42px);
      }

      p {
        line-height: 1.8;
      }

      .sub {
        color: var(--sub);
        margin-top: 12px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }

      .card {
        padding: 22px;
      }

      .tag {
        display: inline-block;
        margin-bottom: 10px;
        padding: 6px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-weight: 700;
        font-size: 13px;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .link {
        margin-top: 12px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <h1>うちの子日記</h1>
        <p class="sub">
          うちの子との毎日を、写真3枚と短い言葉でやさしく残す思い出アプリです。
        </p>
      </section>

      <section class="grid">
        <a class="card" href="./privacy.html">
          <div class="tag">Privacy</div>
          <h2>プライバシーポリシー</h2>
          <p class="link">ページを見る</p>
        </a>

        <a class="card" href="./support.html">
          <div class="tag">Support</div>
          <h2>サポート</h2>
          <p class="link">ページを見る</p>
        </a>
      </section>
    </main>
  </body>
</html>
